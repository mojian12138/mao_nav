<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫猫导航 - 安装向导</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        猫猫导航安装向导
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        配置您的站点信息以完成部署
      </p>
    </div>
    <form class="mt-8 space-y-6" id="installForm">
      <div class="rounded-md shadow-sm -space-y-px">
        <div class="mb-4">
          <label for="adminPassword" class="block text-sm font-medium text-gray-700 mb-1">管理员密码</label>
          <input id="adminPassword" name="adminPassword" type="text" required class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="设置后台管理密码">
        </div>
        <div class="mb-4">
          <label for="port" class="block text-sm font-medium text-gray-700 mb-1">运行端口</label>
          <input id="port" name="port" type="number" required value="8787" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="默认 8787">
        </div>
        <div class="mb-4">
          <label for="domain" class="block text-sm font-medium text-gray-700 mb-1">绑定域名 (选填)</label>
          <input id="domain" name="domain" type="text" class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="例如: nav.example.com">
          <p class="mt-1 text-xs text-gray-500">用于生成 Nginx 配置文件</p>
        </div>
      </div>

      <div>
        <button type="submit" id="submitBtn" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          开始安装
        </button>
      </div>
    </form>
    
    <div id="status" class="hidden mt-4 p-4 rounded-md"></div>
  </div>

  <script>
    document.getElementById('installForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerText = '安装中...';
      status.classList.add('hidden');
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      try {
        const res = await fetch('/api/install', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        status.classList.remove('hidden');
        if (res.ok) {
          status.className = 'mt-4 p-4 rounded-md bg-green-50 text-green-700';
          status.innerHTML = `
            <p class="font-bold">安装成功！</p>
            <p class="mt-2">配置文件已生成。</p>
            <p class="mt-1">如果您使用宝塔面板，请检查 <code>deploy/nginx/</code> 目录下的配置文件。</p>
            <p class="mt-2">正在重启服务...</p>
          `;
          setTimeout(() => {
            window.location.href = '/';
          }, 3000);
        } else {
          throw new Error(result.error || '安装失败');
        }
      } catch (err) {
        status.className = 'mt-4 p-4 rounded-md bg-red-50 text-red-700';
        status.innerText = '错误: ' + err.message;
        btn.disabled = false;
        btn.innerText = '开始安装';
      }
    });
  </script>
</body>
</html>
